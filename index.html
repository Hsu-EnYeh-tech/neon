<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>neon_ai_v4_Pro</title>
    <style>
        :root { --neon-blue: #00d4ff; --neon-purple: #9d00ff; --bg-dark: #050506; --card-bg: #111113; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', system-ui; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        #lockdown-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; text-align: center; }
        #lockdown-timer { font-size: 3rem; margin-top: 20px; font-family: monospace; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 15px; }
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .ai-button { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px 16px; border-radius: 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .dropdown-content { display: none; position: absolute; background-color: var(--card-bg); min-width: 180px; border: 1px solid var(--neon-purple); border-radius: 10px; z-index: 100; top: 100%; left: 0; }
        .dropdown-content button { color: white; padding: 12px 16px; display: block; background: transparent; border: none; width: 100%; text-align: left; cursor: pointer; }
        .ai-changer:hover .dropdown-content { display: block; }
        .neon-hub-container { border: 2px solid var(--neon-blue); padding: 30px; border-radius: 20px; max-width: 750px; width: 95%; text-align: center; background: #080809; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        input[type="text"] { flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1c; color: white; }
        .gen-btn { padding: 0 25px; background: var(--neon-purple); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .style-selector { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
        .style-btn { background: #1a1a1c; border: 1px solid #333; color: #aaa; padding: 8px 14px; border-radius: 15px; cursor: pointer; }
        .style-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); font-weight: bold; background: #2a2a2e; }
        .loader-pulse { width: 50px; height: 50px; border: 5px solid var(--neon-purple); border-top: 5px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #gallery-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,6,0.95); z-index: 1000; overflow-y: auto; padding: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { border: 1px solid var(--neon-purple); padding: 10px; border-radius: 15px; background: #111; }
        .gallery-item img { width: 100%; border-radius: 5px; }
        .icon-btn { cursor: pointer; background: transparent; border: none; font-size: 20px; padding: 10px; }
    </style>
</head>

            <button onclick="setAI('canva')">Canva Design</button>
        </div>
    </div>
    <button class="ai-button" onclick="toggleGallery(true)">Gallery</button>
</header>
