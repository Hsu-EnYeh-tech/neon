<script>

// ==========================================
// GLOBALS
// ==========================================

let currentAI = 'flux';
let activeModifier = '';

let imageHistory =
    JSON.parse(localStorage.getItem('neon_gallery')) || [];

const blockedWords = [
    'suck','fuck','dick','shit','bastard',
    'ass','butt','crap','hell','bitch',
    'motherfucker','retard','penis',
    'sex','damn','bollock','cunt','cock',
    'bullshit','douche','twat','prick'
];

const timeSequence = [3,5,10,15,20,25,30,35,40,45,50,55,60];

// AUDIO
const alertAudio = document.getElementById('audio-alert');
const voiceAudio = document.getElementById('audio-voice');

// Alert quieter, voice louder
alertAudio.volume = 0.12;
voiceAudio.volume = 1.0;

// ==========================================
// LOCKDOWN SYSTEM
// ==========================================

let lockdownLevel =
    parseInt(localStorage.getItem('neonLockdownLevel')) || 0;

let lockEndTime =
    parseInt(localStorage.getItem('neonLockEndTime')) || 0;

function playLockdownAudio() {
    try {
        alertAudio.currentTime = 0;
        voiceAudio.currentTime = 0;

        alertAudio.loop = true;
        alertAudio.play();

        voiceAudio.play();

        voiceAudio.onended = () => {
            if (Date.now() < lockEndTime) {
                voiceAudio.currentTime = 0;
                voiceAudio.play();
            }
        };

    } catch (e) {
        console.log(e);
    }
}

function stopLockdownAudio() {
    alertAudio.pause();
    voiceAudio.pause();

    alertAudio.currentTime = 0;
    voiceAudio.currentTime = 0;

    voiceAudio.onended = null;
}

function updateTimerDisplay(seconds) {
    document.getElementById('lockdown-timer')
        .innerText = `00:${seconds.toString().padStart(2,'0')}`;
}

function checkLockdown() {
    let now = Date.now();

    if (now < lockEndTime) {

        document.getElementById('lockdown-screen').style.display = 'flex';

        let remaining = Math.ceil((lockEndTime - now) / 1000);

        updateTimerDisplay(remaining);

        if (alertAudio.paused) playLockdownAudio();

        let interval = setInterval(() => {

            remaining--;
            updateTimerDisplay(remaining);

            if (remaining <= 0) {
                clearInterval(interval);
                document.getElementById('lockdown-screen').style.display = 'none';
                stopLockdownAudio();
            }

        }, 1000);

    } else {
        stopLockdownAudio();
    }
}

function triggerLockdown() {

    let waitTime = timeSequence[lockdownLevel] || 60;

    lockEndTime = Date.now() + waitTime * 1000;

    localStorage.setItem('neonLockEndTime', lockEndTime);

    if (lockdownLevel < timeSequence.length - 1) {
        lockdownLevel++;
        localStorage.setItem('neonLockdownLevel', lockdownLevel);
    }

    checkLockdown();
}

// ==========================================
// STYLE + AI
// ==========================================

function setAI(aiId) {

    currentAI = aiId;

    const names = {
        flux: 'Flux (Default)',
        dalle: 'ChatGPT (DALL-E 3)',
        gemini: 'Google Gemini',
        canva: 'Canva Design'
    };

    document.getElementById('active-ai-display')
        .innerText = names[aiId];
}

function setStyle(btn, mod, rec) {

    document.querySelectorAll('.style-btn')
        .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    activeModifier = mod;

    document.getElementById('engine-rec')
        .innerText = `Recommended Engine: ${rec}`;
}

// ==========================================
// GENERATION
// ==========================================

function getProStatus(prompt) {

    let p = prompt.toLowerCase();

    let messages = [
        "Initializing neural bridge...",
        "Analyzing semantic structure..."
    ];

    messages.push("Finalizing render...");
    return messages;
}

async function handleGenerate() {

    const input = document.getElementById('prompt-input');
    const prompt = input.value.trim();

    if (!prompt) return;

    if (blockedWords.some(w => new RegExp(`\\b${w}\\b`, 'i').test(prompt))) {
        input.value = '';
        triggerLockdown();
        return;
    }

    const img = document.getElementById('current-image');
    const statusMsg = document.getElementById('status-msg');

    document.getElementById('loader').style.display = 'block';
    img.style.display = 'none';

    const stages = getProStatus(prompt);

    let i = 0;
    statusMsg.innerText = stages[i];

    let interval = setInterval(() => {
        i = (i + 1) % stages.length;
        statusMsg.innerText = stages[i];
    }, 1000);

    const modelParam =
        currentAI === 'dalle' ? 'dall-e-3' :
        currentAI === 'gemini' ? 'gemini' : 'flux';

    const imageUrl =
        `https://image.pollinations.ai/prompt/${
            encodeURIComponent(prompt + ', ' + activeModifier)
        }?model=${modelParam}&seed=${Date.now()}`;

    img.src = imageUrl;

    img.onload = () => {
        clearInterval(interval);
        document.getElementById('loader').style.display = 'none';
        img.style.display = 'block';
        statusMsg.innerText = "Done!";
    };

    img.onerror = () => {
        clearInterval(interval);
        document.getElementById('loader').style.display = 'none';
        statusMsg.innerText = "Failed.";
    };
}

// ==========================================
// GALLERY
// ==========================================

function saveGallery() {
    localStorage.setItem('neon_gallery', JSON.stringify(imageHistory));
}

function addToGallery(url) {
    imageHistory.push(url);
    saveGallery();
}

function renderGallery() {
    const container = document.getElementById('gallery-container');
    container.innerHTML = '';

    imageHistory.forEach((url, i) => {

        const div = document.createElement('div');
        div.className = 'gallery-item';

        div.innerHTML = `
            <img src="${url}">
            <div class="gal-controls">
                <button onclick="downloadImg('${url}')">⬇️</button>
                <button onclick="deleteImg(${i})">🗑️</button>
            </div>
        `;

        container.appendChild(div);
    });
}

function deleteImg(i) {
    imageHistory.splice(i,1);
    saveGallery();
    renderGallery();
}

function downloadImg(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = 'neon.jpg';
    a.click();
}

function toggleGallery(show) {
    document.getElementById('gallery-view').style.display =
        show ? 'block' : 'none';
}

// STARTUP
checkLockdown();
renderGallery();

</script>
